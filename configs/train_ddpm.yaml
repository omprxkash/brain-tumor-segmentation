# DDPM training configuration

# Data
json_path: "data/brats_ssa_2024_5fold.json"
npy_dir: "data/processed"

# Model
base_ch: 64

# Diffusion
T: 250

# Training
total_steps: 100000
batch_size: 1
grad_accum: 2
lr: 0.00001

# EMA
ema_decay: 0.995
ema_start_step: 2000
ema_update_every: 10

# Checkpointing
checkpoint_dir: "checkpoints/ddpm"
